replicaCount: 1

image:
  repository: gateway-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  liveness:
    path: /actuator/health
    initialDelaySeconds: 70
    periodSeconds: 15
  readiness:
    path: /actuator/health
    initialDelaySeconds: 35
    periodSeconds: 10
