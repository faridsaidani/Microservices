replicaCount: 1

image:
  repository: catalogue-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    cpu: "200m"
    memory: "384Mi"
  limits:
    cpu: "700m"
    memory: "768Mi"

probes:
  liveness:
    path: /actuator/health
    initialDelaySeconds: 80
    periodSeconds: 15
  readiness:
    path: /actuator/health
    initialDelaySeconds: 45
    periodSeconds: 10

database:
  name: catalogue_db
  username: postgres
  password: postgres
  storageSize: 1Gi
  image: postgres:15-alpine
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
