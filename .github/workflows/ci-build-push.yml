name: CI Build and Push Images

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - config-service
          - discovery-service
          - gateway-service
          - catalogue-service
          - commande-service
          - paiement-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Prepare Maven Wrapper
        working-directory: ./${{ matrix.service }}
        run: |
          sed -i 's/\r$//' mvnw
          chmod +x mvnw

      - name: Test and package ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: ./mvnw clean verify

  docker-build-push:
    needs: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - config-service
          - discovery-service
          - gateway-service
          - catalogue-service
          - commande-service
          - paiement-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest ./${{ matrix.service }}

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
