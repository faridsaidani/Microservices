name: CI Build and Push Images

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - config-service
          - discovery-service
          - gateway-service
          - catalogue-service
          - commande-service
          - paiement-service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Prepare Maven Wrapper
        working-directory: ./${{ matrix.service }}
        run: |
          sed -i 's/\r$//' mvnw
          chmod +x mvnw

      - name: Test and package ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: ./mvnw clean verify

  docker-build-push:
    needs: build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - config-service
          - discovery-service
          - gateway-service
          - catalogue-service
          - commande-service
          - paiement-service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker Hub secrets
        id: docker_secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login Docker Hub
        if: steps.docker_secrets.outputs.has_secrets == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        if: steps.docker_secrets.outputs.has_secrets == 'true'
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest ./${{ matrix.service }}

      - name: Push image
        if: steps.docker_secrets.outputs.has_secrets == 'true'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

      - name: Missing Docker Hub secrets
        if: steps.docker_secrets.outputs.has_secrets != 'true'
        run: echo "::warning::docker-build-push skipped: configure DOCKER_USERNAME and DOCKER_PASSWORD repository secrets."
