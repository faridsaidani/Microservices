# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  microservices-net:
    driver: bridge

# ─── Volumes (persistent DB storage) ─────────────────────────────────────────
volumes:
  catalogue-db-data:
  commande-db-data:
  paiement-db-data:

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  discovery-service:
    build:
      context: ./discovery-service
    image: discovery-service:1.0
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - microservices-net

  config-service:
    build:
      context: ./config-service
    image: config-service:1.0
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      # Keep 'native' so Config Server uses classpath files; add 'docker' for Eureka URL override
      - SPRING_PROFILES_ACTIVE=native,docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - microservices-net

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASES (Task 12 — one PostgreSQL per data service)
  # ═══════════════════════════════════════════════════════════════════════════

  catalogue-db:
    image: postgres:16-alpine
    container_name: catalogue-db
    environment:
      POSTGRES_DB: ${CATALOGUE_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - catalogue-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${CATALOGUE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  commande-db:
    image: postgres:16-alpine
    container_name: commande-db
    environment:
      POSTGRES_DB: ${COMMANDE_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - commande-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${COMMANDE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  paiement-db:
    image: postgres:16-alpine
    container_name: paiement-db
    environment:
      POSTGRES_DB: ${PAIEMENT_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - paiement-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PAIEMENT_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # ═══════════════════════════════════════════════════════════════════════════
  # BUSINESS SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  catalogue-service:
    build:
      context: ./catalogue-service
    image: catalogue-service:1.0
    container_name: catalogue-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka
      # PostgreSQL datasource (overrides H2 defaults)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://catalogue-db:5432/${CATALOGUE_DB}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_H2_CONSOLE_ENABLED=false
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      catalogue-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-net

  commande-service:
    build:
      context: ./commande-service
    image: commande-service:1.0
    container_name: commande-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka
      # PostgreSQL datasource (overrides H2 defaults)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://commande-db:5432/${COMMANDE_DB}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_H2_CONSOLE_ENABLED=false
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      commande-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8082/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-net

  paiement-service:
    build:
      context: ./paiement-service
    image: paiement-service:1.0
    container_name: paiement-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka
      # PostgreSQL datasource (overrides H2 defaults)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://paiement-db:5432/${PAIEMENT_DB}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_H2_CONSOLE_ENABLED=false
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      paiement-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-net

  gateway-service:
    build:
      context: ./gateway-service
    image: gateway-service:1.0
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-net

  frontend-service:
    build:
      context: ./frontend-service
    image: frontend-service:1.0
    container_name: frontend-service
    ports:
      - "3000:80"
    depends_on:
      gateway-service:
        condition: service_healthy
    networks:
      - microservices-net
